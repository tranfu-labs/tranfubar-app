services:
  tranfubar-app:
    build:
      context: .
    image: tranfubar-app:latest
    container_name: tranfubar-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4317
      DEFAULT_TEAM_ID: ${DEFAULT_TEAM_ID:-tranfu-ai}
      STORE_BACKEND: sqlite
      SQLITE_PATH: /data/usage.sqlite
      SQLITE_STORE_ID: ${SQLITE_STORE_ID:-tranfu-ai}
      TEAM_INGEST_TOKEN: ${TEAM_INGEST_TOKEN:-change-me}
    expose:
      - "4317"
    volumes:
      - tranfubar-data:/data

volumes:
  tranfubar-data:
